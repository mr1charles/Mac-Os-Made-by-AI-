<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>VideoHub</title>
  <style>
    :root { --bg:#0f0f0f; --panel:#1a1a1a; --text:#f1f1f1; --muted:#a6a6a6; --accent:#ff0033; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Inter,system-ui,-apple-system,sans-serif; background:var(--bg); color:var(--text); }
    .layout { display:grid; grid-template-columns:minmax(420px,1.6fr) 1fr; gap:14px; height:100vh; padding:12px; }
    .player, .library { background:var(--panel); border-radius:14px; padding:12px; }
    .top { display:flex; gap:8px; align-items:center; margin-bottom:10px; }
    input, select, button { border:none; border-radius:10px; padding:8px 10px; }
    input, select { background:#222; color:#fff; }
    button { background:var(--accent); color:#fff; cursor:pointer; }
    #video { width:100%; max-height:58vh; background:#000; border-radius:12px; }
    .controls { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:8px; margin-top:8px; }
    .controls label { display:flex; flex-direction:column; gap:6px; font-size:12px; color:var(--muted); }
    .thumbs { margin-top:10px; display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px; overflow:auto; max-height:calc(100vh - 82px); }
    .card { background:#222; border-radius:10px; padding:8px; cursor:pointer; }
    .thumb { height:84px; border-radius:8px; background:linear-gradient(135deg,#313131,#111); display:grid; place-items:center; color:#fff; }
    .meta { margin-top:6px; font-size:12px; color:var(--muted); }
  </style>
</head>
<body>
<div class="layout">
  <section class="player">
    <div class="top">
      <input id="search" placeholder="Search videos" style="flex:1" />
      <select id="category"><option>All</option><option>Tutorial</option><option>Music</option><option>Design</option></select>
      <label style="background:#222;color:#fff;padding:8px 10px;border-radius:10px;cursor:pointer;">Upload<input id="upload" type="file" accept="video/*" hidden></label>
    </div>
    <video id="video" controls></video>
    <div class="controls">
      <label>Speed<select id="speed"><option>0.5</option><option>0.75</option><option selected>1</option><option>1.25</option><option>1.5</option><option>2</option></select></label>
      <label>Volume<input id="volume" type="range" min="0" max="1" step="0.01" value="1"></label>
      <label>Seek<input id="seek" type="range" min="0" max="100" value="0"></label>
      <button id="fullscreen">Fullscreen</button>
    </div>
  </section>
  <aside class="library">
    <h3 style="margin:4px 0 8px 0">Recommended</h3>
    <div id="grid" class="thumbs"></div>
  </aside>
</div>
<script>
  const $ = (id) => document.getElementById(id);
  const el = {
    video: $('video'), grid: $('grid'), search: $('search'), category: $('category'),
    upload: $('upload'), speed: $('speed'), volume: $('volume'), seek: $('seek'), fullscreen: $('fullscreen')
  };

  const demo = [
    { title: 'Motion UI Basics', category: 'Design' },
    { title: 'LoFi Coding Session', category: 'Music' },
    { title: 'JavaScript Drag & Drop', category: 'Tutorial' },
    { title: 'CSS Glassmorphism', category: 'Design' },
    { title: 'Productivity Sounds', category: 'Music' }
  ];
  let localVideos = [];

  function render() {
    const q = el.search.value.toLowerCase();
    const c = el.category.value;
    el.grid.innerHTML = [...localVideos, ...demo]
      .filter((v) => v.title.toLowerCase().includes(q) && (c === 'All' || v.category === c))
      .map((v, i) => `<article class="card" data-i="${i}"><div class="thumb">▶</div><div>${v.title}</div><div class="meta">${v.category || 'Local file'}</div></article>`)
      .join('');
  }

  function loadVideoFile(file) {
    if (!file || !file.type.startsWith('video/')) return;
    const url = URL.createObjectURL(file);
    localVideos.unshift({ title: file.name, url, category: 'Local' });
    el.video.src = url;
    el.video.play();
    render();
  }

  el.grid.onclick = (e) => {
    const card = e.target.closest('.card');
    if (!card) return;
    const item = [...localVideos, ...demo][Number(card.dataset.i)];
    if (item.url) {
      el.video.src = item.url;
      el.video.play();
    } else {
      alert('Demo item selected. Upload or drop a local file for real playback.');
    }
  };

  el.upload.onchange = (e) => loadVideoFile(e.target.files[0]);
  el.speed.onchange = () => { el.video.playbackRate = Number(el.speed.value); };
  el.volume.oninput = () => { el.video.volume = Number(el.volume.value); };
  el.seek.oninput = () => {
    if (el.video.duration) el.video.currentTime = (Number(el.seek.value) / 100) * el.video.duration;
  };
  el.video.ontimeupdate = () => {
    if (el.video.duration) el.seek.value = String((el.video.currentTime / el.video.duration) * 100);
  };
  el.fullscreen.onclick = () => el.video.requestFullscreen?.();

  el.search.oninput = render;
  el.category.onchange = render;

  document.body.ondragover = (e) => e.preventDefault();
  document.body.ondrop = (e) => {
    e.preventDefault();
    const file = [...e.dataTransfer.files].find((f) => f.type.startsWith('video/'));
    loadVideoFile(file);
  };

  render();
</script>
</body>
</html>
